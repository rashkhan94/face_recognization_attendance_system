databases:
  - name: fras-db
    databaseName: fras
    plan: free

services:
  - type: web
    name: fras-attendance
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fras-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
