<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS — Super Admin Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060810;
            --surface: #0D1017;
            --card: #111520;
            --card-hover: #151A28;
            --accent: #4F7BF7;
            --accent2: #7B5CF5;
            --accent-glow: rgba(79,123,247,.30);
            --accent-dim: rgba(79,123,247,.08);
            --text: #E4E8F1;
            --muted: #4D5672;
            --border: rgba(255,255,255,.06);
            --border-s: rgba(255,255,255,.12);
            --red: #E05555;
            --red-bg: rgba(224,85,85,.08);
            --green: #3DBE7A;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbit 20s ease-in-out infinite;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(79,123,247,.07);
            top: -100px; right: -100px;
            animation-duration: 25s;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: rgba(123,92,245,.06);
            bottom: -100px; left: -100px;
            animation-duration: 30s;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: rgba(61,190,122,.04);
            top: 50%; left: 50%;
            animation-duration: 18s;
            animation-delay: -10s;
        }
        @keyframes orbit {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.05); }
        }

        /* Grid pattern */
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(79,123,247,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,123,247,.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            pointer-events: none;
        }

        /* Floating particles */
        .particles {
            position: fixed; inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: rgba(79,123,247,.3);
            border-radius: 50%;
            animation: float-up linear infinite;
        }
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .login-container {
            width: 100%; max-width: 440px;
            position: relative; z-index: 10;
            animation: entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes entrance {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .login-header { text-align: center; margin-bottom: 32px; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--muted);
            text-decoration: none; margin-bottom: 28px;
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,.02);
        }
        .back-btn:hover {
            color: var(--text);
            border-color: var(--border-s);
            background: rgba(255,255,255,.04);
            transform: translateX(-3px);
        }

        .logo-ring {
            width: 80px; height: 80px;
            margin: 0 auto 20px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-ring::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            animation: ring-spin 6s linear infinite;
            opacity: 0.15;
        }
        .logo-ring::after {
            content: '';
            position: absolute; inset: 3px;
            border-radius: 17px;
            background: var(--bg);
        }
        @keyframes ring-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo-icon {
            position: relative; z-index: 2;
            width: 72px; height: 72px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 24px; font-weight: 900; color: white;
            box-shadow: 0 8px 32px var(--accent-glow);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .logo-icon:hover {
            transform: scale(1.05) rotate(-3deg);
            box-shadow: 0 12px 40px var(--accent-glow);
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px; font-weight: 900;
            background: linear-gradient(135deg, var(--text) 0%, rgba(228,232,241,.6) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 14px; color: var(--muted);
            letter-spacing: 0.3px;
        }

        /* Security badge */
        .sec-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px;
            background: var(--accent-dim);
            border: 1px solid rgba(79,123,247,.15);
            border-radius: 100px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; font-weight: 500;
            letter-spacing: 1.5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
            animation: badge-pulse 3s ease-in-out infinite;
        }
        .sec-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: dot-blink 2s ease-in-out infinite;
        }
        @keyframes badge-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(79,123,247,.1); }
            50% { box-shadow: 0 0 0 6px rgba(79,123,247,.05); }
        }
        @keyframes dot-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Card */
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s, box-shadow 0.4s;
        }
        .login-card:hover {
            border-color: rgba(79,123,247,.12);
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        /* Shine effect on card */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(79,123,247,.03), transparent);
            animation: card-shine 4s ease-in-out infinite;
        }
        @keyframes card-shine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        /* Fields */
        .field-group { margin-bottom: 20px; position: relative; }
        .field-group label {
            display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 9px;
            transition: color 0.3s;
        }
        .field-group:focus-within label { color: var(--accent); }
        .field-group .lbl-icon { font-size: 12px; }

        .field-input {
            width: 100%; padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px; font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        .field-input:focus {
            border-color: rgba(79,123,247,.5);
            box-shadow: 0 0 0 4px rgba(79,123,247,.08);
            background: rgba(13,16,23,.9);
        }
        .field-input::placeholder { color: var(--muted); font-size: 14px; }

        /* Show password toggle */
        .pw-wrap { position: relative; }
        .pw-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 16px; padding: 4px;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--text); }

        /* Error */
        .login-error {
            display: none; margin-bottom: 18px;
            padding: 12px 16px;
            background: var(--red-bg);
            border: 1px solid rgba(224,85,85,.2);
            border-radius: 12px;
            font-size: 13px; color: var(--red);
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Button */
        .btn-auth {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .btn-auth::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .btn-auth:hover::before { transform: translateX(100%); }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--accent-glow);
        }
        .btn-auth:active { transform: translateY(0); }
        .btn-auth:disabled {
            opacity: 0.7; cursor: not-allowed;
            transform: none !important;
        }
        .btn-auth .btn-text { position: relative; z-index: 1; }
        .btn-auth .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        .btn-auth.loading .btn-text { display: none; }
        .btn-auth.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .login-footer {
            text-align: center; margin-top: 24px;
            display: flex; flex-direction: column; gap: 10px;
            align-items: center;
        }
        .footer-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: var(--muted);
            padding: 5px 12px;
            background: rgba(255,255,255,.02);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .footer-link {
            font-size: 12px; color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-link:hover { color: var(--accent); }

        /* Success animation */
        .success-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(6,8,16,.9);
            backdrop-filter: blur(20px);
            z-index: 100;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
        }
        .success-overlay.show { display: flex; }
        .success-check {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), #2A9D5C);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 40px rgba(61,190,122,.3);
        }
        @keyframes pop-in {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .success-text {
            font-family: 'Playfair Display', serif;
            font-size: 22px; color: var(--text);
            animation: entrance 0.5s ease 0.2s both;
        }

        @media (max-width: 500px) {
            .login-header h1 { font-size: 26px; }
            .login-card { padding: 24px; }
        }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>

<div class="login-container">
    <div class="login-header">
        <a href="/" class="back-btn">← Back to Home</a>
        <div class="sec-badge">Restricted Access</div>
        <div class="logo-ring">
            <div class="logo-icon">SA</div>
        </div>
        <h1>Super Admin</h1>
        <p>System-wide administration portal</p>
    </div>

    <div class="login-card">
        <div class="login-error" id="sa-err">Invalid credentials. Please try again.</div>

        <div class="field-group">
            <label><span class="lbl-icon">👤</span> Username</label>
            <input type="text" class="field-input" id="sa-user" placeholder="Enter admin username"
                   autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
        </div>

        <div class="field-group">
            <label><span class="lbl-icon">🔑</span> Password</label>
            <div class="pw-wrap">
                <input type="password" class="field-input" id="sa-pass" placeholder="••••••••"
                       onkeydown="if(event.key==='Enter')doLogin()">
                <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
            </div>
        </div>

        <button class="btn-auth" id="btn-login" onclick="doLogin()">
            <span class="btn-text">Authenticate →</span>
            <div class="spinner"></div>
        </button>
    </div>

    <div class="login-footer">
        <div class="footer-time" id="live-clock"></div>
        <a href="/" class="footer-link">FRAS — Face Recognition Attendance System</a>
    </div>
</div>

<div class="success-overlay" id="success-overlay">
    <div class="success-check">✓</div>
    <div class="success-text">Access Granted</div>
</div>

<script>
    // Floating particles
    (function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
            p.style.opacity = (0.15 + Math.random() * 0.3);
            container.appendChild(p);
        }
    })();

    // Live clock
    (function tick() {
        const now = new Date();
        document.getElementById('live-clock').textContent =
            now.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short', year:'numeric'}) +
            '  •  ' + now.toLocaleTimeString('en-GB');
        setTimeout(tick, 1000);
    })();

    // Toggle password visibility
    function togglePw() {
        const inp = document.getElementById('sa-pass');
        const eye = document.getElementById('pw-eye');
        if (inp.type === 'password') { inp.type = 'text'; eye.textContent = '🔒'; }
        else { inp.type = 'password'; eye.textContent = '👁'; }
    }

    // Login
    async function doLogin() {
        const btn = document.getElementById('btn-login');
        const err = document.getElementById('sa-err');
        err.style.display = 'none';
        btn.classList.add('loading'); btn.disabled = true;

        try {
            const res = await fetch('/api/superadmin/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('sa-user').value,
                    password: document.getElementById('sa-pass').value
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('success-overlay').classList.add('show');
                setTimeout(() => { window.location.href = '/superadmin/dashboard'; }, 1200);
            } else {
                err.style.display = 'block';
                document.getElementById('sa-pass').value = '';
                document.getElementById('sa-pass').focus();
                btn.classList.remove('loading'); btn.disabled = false;
            }
        } catch {
            err.textContent = 'Server error. Make sure Flask is running.';
            err.style.display = 'block';
            btn.classList.remove('loading'); btn.disabled = false;
        }
    }

    document.getElementById('sa-user').focus();
</script>
</body>
</html>
