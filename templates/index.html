<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS — Attendance System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0C0E13; --s1:#13161F; --card:#181C27; --card2:#1E2332;
            --gold:#D4A843; --gold-g:rgba(212,168,67,.20); --gold-d:rgba(212,168,67,.09);
            --text:#E8E2D5; --muted:#6B6760; --muted2:#3E3C38;
            --green:#2D7A4F; --green-d:rgba(45,122,79,.10); --green-t:#5DBE8A;
            --red:#8B2525; --red-d:rgba(139,37,37,.10); --red-t:#E07070;
            --blue:#3D6BE8; --blue-d:rgba(61,107,232,.10);
            --border:rgba(255,255,255,.06); --border-s:rgba(255,255,255,.11);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}

        /* HEADER — compact */
        header{
            position:sticky;top:0;z-index:100;
            padding:0 48px;
            background:rgba(12,14,19,.9);backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
        }
        .hdr{
            max-width:1400px;margin:0 auto;
            display:flex;align-items:center;justify-content:space-between;
            height:56px;
        }
        .brand{display:flex;align-items:center;gap:10px;}
        .brand-ic{
            width:30px;height:30px;border-radius:7px;
            background:linear-gradient(135deg,var(--gold),#B8922A);
            display:flex;align-items:center;justify-content:center;
            font-family:'Playfair Display',serif;font-size:12px;color:#0C0E13;font-weight:900;
            box-shadow:0 0 14px var(--gold-g);
        }
        .brand-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);}
        .brand-name span{color:var(--gold);}
        .hdr-right{display:flex;align-items:center;gap:8px;}
        .hdr-clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;}
        .hdr-link{font-size:12px;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:7px;transition:all .2s;}
        .hdr-link:hover{color:var(--text);border-color:var(--border-s);}

        /* PAGE WRAPPER */
        .page{max-width:1400px;margin:0 auto;padding:28px 48px 80px;}

        /* SECTION LABEL */
        .sec-label{
            display:flex;align-items:center;gap:10px;
            font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
            color:var(--muted);margin-bottom:16px;
        }
        .sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

        /* ── SITE GRID ── */
        .sites-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
            gap:16px;margin-bottom:40px;
        }
        .site-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:14px;overflow:hidden;
            transition:all .25s;position:relative;
        }
        .site-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,var(--gold),transparent);
            opacity:0;transition:opacity .3s;
        }
        .site-card:hover{border-color:rgba(212,168,67,.2);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 24px var(--gold-d);}
        .site-card:hover::before{opacity:1;}
        .sc-top{padding:18px 18px 14px;}
        .sc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
        .sc-type{
            font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;
            text-transform:uppercase;color:var(--gold);
            background:var(--gold-d);border:1px solid rgba(212,168,67,.18);
            padding:3px 8px;border-radius:4px;
        }
        .sc-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
        .sc-name{font-family:'Playfair Display',serif;font-size:19px;color:var(--text);margin-bottom:4px;line-height:1.2;}
        .sc-venue{font-size:12px;color:var(--muted);margin-bottom:2px;}
        .sc-venue span{color:var(--gold-t, #C8A84A);font-weight:600;}
        .sc-divider{height:1px;background:var(--border);margin:0 18px;}
        .sc-actions{padding:12px 18px;display:flex;flex-direction:column;gap:8px;}
        .btn-scan{
            display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;
            background:linear-gradient(135deg,var(--gold),#B8922A);
            color:#0C0E13;border:none;border-radius:9px;
            font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;
            cursor:pointer;text-decoration:none;transition:all .2s;
        }
        .btn-scan:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--gold-g);}
        .btn-admin-link{
            display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;
            background:transparent;color:var(--muted);
            border:1px solid var(--border);border-radius:8px;
            font-size:12px;font-weight:500;font-family:'Outfit',sans-serif;
            cursor:pointer;text-decoration:none;transition:all .2s;
        }
        .btn-admin-link:hover{color:var(--text);border-color:var(--border-s);}

        /* ── TWO-COL SECTIONS ── */
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px;}
        @media(max-width:900px){.two-col{grid-template-columns:1fr;}}

        /* ── INFO PANEL ── */
        .info-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
        .ip-hdr{
            padding:14px 18px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:10px;
        }
        .ip-hdr-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
        .ip-hdr-icon.gold{background:var(--gold-d);}
        .ip-hdr-icon.blue{background:var(--blue-d);}
        .ip-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);}
        .ip-body{padding:12px;}

        /* directory rows */
        .dir-row{
            display:flex;align-items:center;gap:12px;
            padding:10px 12px;border-radius:9px;
            background:var(--s1);margin-bottom:6px;
            transition:background .2s;
        }
        .dir-row:last-child{margin-bottom:0;}
        .dir-row:hover{background:var(--card2);}
        .dr-icon{
            width:34px;height:34px;border-radius:8px;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;font-size:14px;
        }
        .dr-icon.g{background:var(--gold-d);}
        .dr-icon.b{background:var(--blue-d);}
        .dr-name{font-size:13px;font-weight:600;color:var(--text);}
        .dr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
        .dr-badge{
            margin-left:auto;font-family:'JetBrains Mono',monospace;
            font-size:10px;padding:3px 8px;border-radius:5px;
            background:var(--gold-d);color:var(--gold);
            border:1px solid rgba(212,168,67,.18);white-space:nowrap;
        }
        .dr-badge.b{background:var(--blue-d);color:#7B9BF0;border-color:rgba(61,107,232,.2);}

        .ip-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px;}

        /* ── PUBLIC VENUES SECTION ── */
        .venue-filters{display:flex;gap:6px;margin-bottom:16px;}
        .vf-btn{
            padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;
            border:1px solid var(--border);background:var(--card);
            color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;
            transition:all .2s;
        }
        .vf-btn.active{background:linear-gradient(135deg,var(--gold),#B8922A);color:#0C0E13;border-color:transparent;}
        .vf-btn:hover:not(.active){border-color:var(--border-s);color:var(--text);}

        .venues-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
            gap:14px;margin-bottom:40px;
        }
        .venue-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:12px;padding:16px;
            position:relative;overflow:hidden;
            transition:all .2s;
        }
        .venue-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-2px);}
        .venue-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
        }
        .vc-available::before{background:var(--green-t);}
        .vc-occupied::before{background:var(--gold);}
        .vc-type{
            font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;
            text-transform:uppercase;color:var(--muted);margin-bottom:8px;
        }
        .vc-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);margin-bottom:3px;}
        .vc-num{font-size:12px;color:var(--muted);margin-bottom:10px;}
        .vc-status{
            display:inline-flex;align-items:center;gap:5px;
            font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;
        }
        .vc-status::before{content:'';width:5px;height:5px;border-radius:50%;}
        .vs-available{background:var(--green-d);color:var(--green-t);}
        .vs-available::before{background:var(--green-t);}
        .vs-occupied{background:var(--gold-d);color:var(--gold);}
        .vs-occupied::before{background:var(--gold);animation:blink 2s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .vc-booker{font-size:11px;color:var(--muted);margin-top:6px;}
        .vc-booker strong{color:var(--text);}
        .vc-cap{
            font-family:'JetBrains Mono',monospace;
            font-size:10px;color:var(--muted);margin-top:8px;padding-top:8px;
            border-top:1px solid var(--border);
        }

        /* ── EMPTY / LOADING ── */
        .empty-grid{
            grid-column:1/-1;text-align:center;padding:60px 20px;
            color:var(--muted);font-size:14px;
        }
        .skel{
            background:linear-gradient(90deg,var(--card) 25%,var(--s1) 50%,var(--card) 75%);
            background-size:400% 100%;animation:shimmer 1.5s infinite;
            border-radius:14px;height:180px;
        }
        @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

        @media(max-width:768px){
            header,.page{padding-left:16px;padding-right:16px;}
            .sites-grid{grid-template-columns:1fr;}
            .venues-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>

<header>
    <div class="hdr">
        <div class="brand">
            <div class="brand-ic">FR</div>
            <div class="brand-name">FRAS <span>System</span></div>
        </div>
        <div class="hdr-right">
            <div class="hdr-clock" id="clock"></div>
            <a href="/superadmin" class="hdr-link">⚙ Super Admin</a>
        </div>
    </div>
</header>

<div class="page">

    <!-- ── SITES ── -->
    <div class="sec-label">Classes &amp; Sites — Select yours to mark attendance <span id="site-count" style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:6px;"></span></div>
    <div class="sites-grid" id="sites-grid">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    </div>

    <!-- ── DIRECTORY + CABINS ── -->
    <div class="sec-label">Information Directory</div>
    <div class="two-col" style="margin-bottom:40px;">

        <!-- Venue Directory -->
        <div class="info-panel">
            <div class="ip-hdr">
                <div class="ip-hdr-icon gold">📍</div>
                <div class="ip-title">Class / Site Locations</div>
            </div>
            <div class="ip-body" id="venue-dir">
                <div class="ip-empty">Loading...</div>
            </div>
        </div>

        <!-- Admin Cabin Directory -->
        <div class="info-panel">
            <div class="ip-hdr">
                <div class="ip-hdr-icon blue">🏢</div>
                <div class="ip-title">Admin Office Directory</div>
            </div>
            <div class="ip-body" id="cabin-dir">
                <div class="ip-empty">Loading...</div>
            </div>
        </div>

    </div>

    <!-- ── PUBLIC VENUES ── -->
    <div class="sec-label">Public Venues &amp; Halls</div>
    <div class="venue-filters">
        <button class="vf-btn active" onclick="loadVenues('all',this)">All</button>
        <button class="vf-btn" onclick="loadVenues('available',this)">Available</button>
        <button class="vf-btn" onclick="loadVenues('occupied',this)">Occupied</button>
    </div>
    <div class="venues-grid" id="venues-grid">
        <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    </div>

</div>

<script>
// Clock
(function tick(){
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
    setTimeout(tick,1000);
})();

// ── LOAD SITES ──
async function loadSites(){
    try{
        const sites = await fetch('/api/sites').then(r=>r.json());
        document.getElementById('site-count').textContent = `(${sites.length})`;
        const grid = document.getElementById('sites-grid');
        if(!sites.length){
            grid.innerHTML='<div class="empty-grid">No sites registered yet. Super Admin must create sites first.</div>';
            return;
        }
        grid.innerHTML = sites.map(s=>`
            <div class="site-card">
                <div class="sc-top">
                    <div class="sc-row">
                        <span class="sc-type">${s.room_type||'Classroom'}</span>
                        <span class="sc-id">#${String(s.id).padStart(3,'0')}</span>
                    </div>
                    <div class="sc-name">${s.org_name}</div>
                    <div class="sc-venue">${s.venue_number ? `📍 <span>${s.venue_number}</span>` : '<span style="color:var(--muted)">No venue set</span>'}</div>
                </div>
                <div class="sc-divider"></div>
                <div class="sc-actions">
                    <a href="/portal/${s.id}" class="btn-scan">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
                        Scan Attendance
                    </a>
                    <a href="/admin/login/${s.id}" class="btn-admin-link">🔐 Admin Login</a>
                </div>
            </div>`).join('');

        // Venue & cabin directory
        renderVenueDir(sites);
        renderCabinDir(sites);
    }catch(e){
        document.getElementById('sites-grid').innerHTML='<div class="empty-grid">Could not connect to server. Ensure Flask is running.</div>';
    }
}

function renderVenueDir(sites){
    const el = document.getElementById('venue-dir');
    const withVenue = sites.filter(s=>s.venue_number);
    if(!withVenue.length){ el.innerHTML='<div class="ip-empty">No venue numbers assigned yet.</div>'; return; }
    el.innerHTML = withVenue.map(s=>`
        <div class="dir-row">
            <div class="dr-icon g">📍</div>
            <div>
                <div class="dr-name">${s.org_name}</div>
                <div class="dr-sub">${s.room_type||'Classroom'}</div>
            </div>
            <div class="dr-badge">${s.venue_number}</div>
        </div>`).join('');
}

function renderCabinDir(sites){
    const el = document.getElementById('cabin-dir');
    const withCabin = sites.filter(s=>s.admin_user||s.cabin_number);
    if(!withCabin.length){ el.innerHTML='<div class="ip-empty">No admin office info set yet.</div>'; return; }
    el.innerHTML = withCabin.map(s=>`
        <div class="dir-row">
            <div class="dr-icon b">🏢</div>
            <div>
                <div class="dr-name">${s.admin_user||'Admin'}</div>
                <div class="dr-sub">${s.org_name}</div>
            </div>
            ${s.cabin_number?`<div class="dr-badge b">${s.cabin_number}</div>`:''}
        </div>`).join('');
}

// ── LOAD PUBLIC VENUES ──
async function loadVenues(filter, btn){
    if(btn){
        document.querySelectorAll('.vf-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
    }
    try{
        const venues = await fetch(`/api/public_venues?status=${filter||'all'}`).then(r=>r.json());
        const grid = document.getElementById('venues-grid');
        if(!venues.length){
            grid.innerHTML='<div class="empty-grid">No public venues in this category.</div>';
            return;
        }
        grid.innerHTML = venues.map(v=>{
            const isOcc = v.status==='occupied';
            const until = v.booked_until ? ` until ${v.booked_until.substring(0,16)}` : '';
            return `
            <div class="venue-card vc-${v.status}">
                <div class="vc-type">${v.venue_type||'Hall'}</div>
                <div class="vc-name">${v.venue_name}</div>
                <div class="vc-num">${v.venue_number||'Location not specified'}</div>
                <div class="vc-status vs-${v.status}">${isOcc?'Occupied':'Available'}</div>
                ${isOcc&&v.current_booker?`<div class="vc-booker">Booked by: <strong>${v.current_booker}</strong>${until}</div>`:''}
                ${v.capacity?`<div class="vc-cap">Capacity: ${v.capacity}</div>`:''}
            </div>`;
        }).join('');
    }catch(e){
        document.getElementById('venues-grid').innerHTML='<div class="empty-grid">Could not load venues.</div>';
    }
}

window.onload = ()=>{ loadSites(); loadVenues('all',null); };
</script>
</body>
</html>
