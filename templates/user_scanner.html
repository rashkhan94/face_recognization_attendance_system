<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAS — Scan Attendance | {{ site.org_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #080A0F;
            --surface:   #0F1218;
            --gold:      #D4A843;
            --gold-glow: rgba(212,168,67,0.25);
            --gold-dim:  rgba(212,168,67,0.10);
            --text:      #E8E2D5;
            --muted:     #55524C;
            --green:     #2D7A4F;
            --green-glow:rgba(45,122,79,0.3);
            --red:       #8B2525;
            --red-glow:  rgba(139,37,37,0.3);
            --amber:     #A07820;
            --border:    rgba(255,255,255,0.06);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

        body {
            background:var(--bg);
            color:var(--text);
            font-family:'Outfit',sans-serif;
            min-height:100vh;
            display:flex; flex-direction:column;
        }

        /* ── TOP BAR ── */
        .topbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:16px 40px;
            background:rgba(8,10,15,0.9);
            backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:50;
        }
        .tb-left { display:flex; align-items:center; gap:16px; }
        .tb-site {
            font-family:'Playfair Display',serif;
            font-size:16px; color:var(--text);
        }
        .tb-type {
            font-family:'JetBrains Mono',monospace;
            font-size:10px; color:var(--gold);
            background:var(--gold-dim);
            border:1px solid rgba(212,168,67,0.2);
            padding:3px 10px; border-radius:4px;
            text-transform:uppercase; letter-spacing:1px;
        }
        .tb-right { display:flex; align-items:center; gap:12px; }
        .tb-clock {
            font-family:'JetBrains Mono',monospace;
            font-size:13px; color:var(--muted);
        }
        .back-btn {
            display:flex; align-items:center; gap:6px;
            font-size:13px; color:var(--muted);
            text-decoration:none; padding:7px 14px;
            border:1px solid var(--border); border-radius:8px;
            transition:all 0.2s;
        }
        .back-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }

        /* ── MAIN ── */
        .main {
            flex:1; display:flex;
            align-items:center; justify-content:center;
            padding:40px 20px;
        }
        .scanner-wrap { width:100%; max-width:520px; }

        /* Title */
        .scanner-title {
            text-align:center; margin-bottom:32px;
        }
        .scanner-title h2 {
            font-family:'Playfair Display',serif;
            font-size:36px; color:var(--text); margin-bottom:6px;
        }
        .scanner-title p { font-size:14px; color:var(--muted); }

        /* Video box */
        .video-box {
            position:relative; border-radius:20px; overflow:hidden;
            background:#050608; aspect-ratio:4/3;
            border:1px solid var(--border);
            transition:box-shadow 0.5s, border-color 0.5s;
            margin-bottom:20px;
        }
        .video-box.glowing-gold  { border-color:rgba(212,168,67,0.4);  box-shadow:0 0 50px var(--gold-glow); }
        .video-box.glowing-green { border-color:rgba(45,122,79,0.5);   box-shadow:0 0 50px var(--green-glow); }
        .video-box.glowing-red   { border-color:rgba(139,37,37,0.5);   box-shadow:0 0 50px var(--red-glow); }

        video {
            width:100%; height:100%; object-fit:cover;
            transform:scaleX(-1); display:block;
        }

        /* Idle overlay */
        .idle-overlay {
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:14px;
            background:var(--surface);
        }
        .idle-overlay.hidden { display:none; }
        .idle-icon { font-size:60px; opacity:0.2; }
        .idle-text { font-size:14px; color:var(--muted); }

        /* Scan line */
        .scan-line {
            position:absolute; left:0; right:0; height:2px;
            background:linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
            opacity:0; pointer-events:none;
        }
        .scan-line.scanning {
            opacity:1;
            animation:sweep 1.8s ease-in-out infinite;
        }
        @keyframes sweep {
            0%   { top:5%;  opacity:0; }
            15%  { opacity:1; }
            85%  { opacity:1; }
            100% { top:95%; opacity:0; }
        }

        /* Corner brackets */
        .corner {
            position:absolute; width:22px; height:22px;
            opacity:0; transition:opacity 0.4s;
        }
        .corner.show { opacity:1; }
        .c-tl { top:14px; left:14px; border-top:2px solid var(--gold); border-left:2px solid var(--gold); }
        .c-tr { top:14px; right:14px; border-top:2px solid var(--gold); border-right:2px solid var(--gold); }
        .c-bl { bottom:14px; left:14px; border-bottom:2px solid var(--gold); border-left:2px solid var(--gold); }
        .c-br { bottom:14px; right:14px; border-bottom:2px solid var(--gold); border-right:2px solid var(--gold); }

        /* ── BUTTONS ── */
        .btn-row { display:flex; flex-direction:column; gap:10px; }
        .btn-activate {
            width:100%; padding:14px;
            background:transparent; color:var(--muted);
            border:1px solid var(--border); border-radius:12px;
            font-size:14px; font-weight:500; font-family:'Outfit',sans-serif;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-activate:hover { color:var(--text); border-color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.03); }
        .btn-activate.hidden { display:none; }

        .btn-scan {
            width:100%; padding:18px;
            background:linear-gradient(135deg, var(--gold), #B8922A);
            color:#080A0F; border:none; border-radius:12px;
            font-size:16px; font-weight:700; font-family:'Outfit',sans-serif;
            cursor:pointer; transition:all 0.25s; letter-spacing:0.3px;
        }
        .btn-scan:hover:enabled { transform:translateY(-2px); box-shadow:0 10px 30px var(--gold-glow); }
        .btn-scan:disabled { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.2); cursor:not-allowed; transform:none; }

        /* ── RESULT BOX ── */
        .result-box {
            margin-top:18px; padding:20px 22px;
            border-radius:14px; display:none;
            animation:fadeUp 0.35s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .result-box.success {
            background:rgba(45,122,79,0.12);
            border:1px solid rgba(45,122,79,0.35);
        }
        .result-box.warning {
            background:rgba(160,120,32,0.12);
            border:1px solid rgba(160,120,32,0.35);
        }
        .result-box.error {
            background:rgba(139,37,37,0.12);
            border:1px solid rgba(139,37,37,0.35);
        }
        .result-box.scanning-state {
            background:rgba(212,168,67,0.06);
            border:1px solid rgba(212,168,67,0.15);
        }
        .result-icon { font-size:24px; margin-bottom:8px; }
        .result-title {
            font-family:'Playfair Display',serif;
            font-size:20px; margin-bottom:4px;
        }
        .result-box.success  .result-title { color:#5BBE88; }
        .result-box.warning  .result-title { color:#D4A843; }
        .result-box.error    .result-title { color:#E07070; }
        .result-box.scanning-state .result-title { color:var(--muted); }
        .result-msg { font-size:14px; color:var(--muted); line-height:1.5; }

        @media(max-width:480px){
            .topbar { padding:14px 16px; }
            .tb-site { font-size:14px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-left">
        <span class="tb-type">{{ site.room_type or 'Site' }}</span>
        <span class="tb-site">{{ site.org_name }}</span>
    </div>
    <div class="tb-right">
        <div class="tb-clock" id="tb-clock"></div>
        <a href="/" class="back-btn">← Back</a>
    </div>
</div>

<div class="main">
    <div class="scanner-wrap">
        <div class="scanner-title">
            <h2>Scan Your Face</h2>
            <p>Position your face within the frame then press Scan.</p>
        </div>

        <div class="video-box" id="video-box">
            <video id="video" autoplay muted playsinline></video>
            <div class="idle-overlay" id="idle-overlay">
                <div class="idle-icon">👁</div>
                <div class="idle-text">Camera not active</div>
            </div>
            <div class="scan-line" id="scan-line"></div>
            <div class="corner c-tl" id="c1"></div>
            <div class="corner c-tr" id="c2"></div>
            <div class="corner c-bl" id="c3"></div>
            <div class="corner c-br" id="c4"></div>
        </div>

        <div class="btn-row">
            <button class="btn-activate" id="btn-activate" onclick="activateCamera()">
                Activate Camera
            </button>
            <button class="btn-scan" id="btn-scan" onclick="scanFace()" disabled>
                Scan &amp; Mark Attendance
            </button>
        </div>

        <div class="result-box" id="result-box">
            <div class="result-icon" id="result-icon"></div>
            <div class="result-title" id="result-title"></div>
            <div class="result-msg"  id="result-msg"></div>
        </div>
    </div>
</div>

<script>
    const ORG_ID = {{ site.id }};
    let stream = null;

    // Clock
    (function tick(){
        document.getElementById('tb-clock').textContent =
            new Date().toLocaleTimeString('en-GB');
        setTimeout(tick, 1000);
    })();

    async function activateCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
            document.getElementById('video').srcObject = stream;
            document.getElementById('idle-overlay').classList.add('hidden');
            document.getElementById('btn-activate').classList.add('hidden');
            document.getElementById('btn-scan').disabled = false;
            document.getElementById('video-box').classList.add('glowing-gold');
            ['c1','c2','c3','c4'].forEach(id => document.getElementById(id).classList.add('show'));
        } catch {
            showResult('error', '✕', 'Camera Denied', 'Please allow camera access in your browser settings.');
        }
    }

    async function scanFace() {
        // Capture frame
        const video  = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg');

        // UI: scanning state
        document.getElementById('btn-scan').disabled = true;
        document.getElementById('btn-scan').textContent = 'Scanning...';
        document.getElementById('scan-line').classList.add('scanning');
        showResult('scanning-state', '⟳', 'Scanning...', 'Analysing biometric data. Please hold still.');

        try {
            const res  = await fetch('/api/mark_attendance', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({org_id: ORG_ID, image: imageData})
            });
            const data = await res.json();
            handleResult(data);
        } catch {
            showResult('error', '✕', 'Server Unreachable', 'Could not connect to the backend. Check that Flask is running.');
        }

        document.getElementById('scan-line').classList.remove('scanning');
        document.getElementById('btn-scan').disabled = false;
        document.getElementById('btn-scan').textContent = 'Scan & Mark Attendance';
    }

    function handleResult(data) {
        const box = document.getElementById('video-box');
        box.classList.remove('glowing-gold','glowing-green','glowing-red');

        if (data.status === 'success') {
            showResult('success', '✓', 'Attendance Marked', data.message);
            box.classList.add('glowing-green');
            setTimeout(() => box.classList.remove('glowing-green'), 4000);
        } else if (data.status === 'warning') {
            showResult('warning', '⚠', 'Already Recorded', data.message);
            box.classList.add('glowing-gold');
            setTimeout(() => box.classList.remove('glowing-gold'), 3000);
        } else {
            showResult('error', '✕', 'Not Recognised', data.message);
            box.classList.add('glowing-red');
            setTimeout(() => box.classList.remove('glowing-red'), 3000);
        }
    }

    function showResult(type, icon, title, msg) {
        const box = document.getElementById('result-box');
        box.className = 'result-box ' + type;
        box.style.display = 'block';
        document.getElementById('result-icon').textContent  = icon;
        document.getElementById('result-title').textContent = title;
        document.getElementById('result-msg').textContent   = msg;
    }
</script>
</body>
</html>
